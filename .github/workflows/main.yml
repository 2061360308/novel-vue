name: Process Novel Uploads

on:
  workflow_dispatch:
    inputs:
      hash:
        description: '指定书籍 hash（留空则处理全部待处理上传）'
        required: false
        type: string

concurrency:
  group: process-novels
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Process Uploads
        run: node scripts/process-uploads.mjs
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTENT_OWNER: ${{ secrets.CONTENT_OWNER }}
          CONTENT_REPO: ${{ secrets.CONTENT_REPO }}
          INPUT_HASH: ${{ inputs.hash }}
